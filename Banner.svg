<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#11111b" />
            <stop offset="100%" stop-color="#181825" />
        </linearGradient>

        <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1e2e" stroke-width="2" />
        </pattern>

        <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#74c7ec" />
            <stop offset="100%" stop-color="#cba6f7" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="url(#bg-grad)" />
    <rect width="100%" height="100%" fill="url(#cyber-grid)" />

    <path d="M 0 350 L 250 350 L 300 400 L 0 400 Z" fill="#1e1e2e" stroke="#74c7ec" stroke-width="3" filter="url(#glow)"/>
    <circle cx="50" cy="375" r="5" fill="#74c7ec" />
    <circle cx="70" cy="375" r="5" fill="#74c7ec" />

    <path d="M 1200 50 L 950 50 L 900 0 L 1200 0 Z" fill="#1e1e2e" stroke="#cba6f7" stroke-width="3" filter="url(#glow)"/>
    <circle cx="1130" cy="25" r="5" fill="#cba6f7" />
    <circle cx="1150" cy="25" r="5" fill="#cba6f7" />

    <g transform="translate(600, 160)">
        <circle cx="0" cy="0" r="55" fill="none" stroke="#cba6f7" stroke-width="6" filter="url(#glow)"/>
        <circle cx="0" cy="0" r="25" fill="#74c7ec" filter="url(#glow)"/>
        <path d="M -50 0 C -70 50 -120 70 -120 70 C -120 70 -60 60 -30 25 Z" fill="#cba6f7" opacity="0.8"/>
        <path d="M -20 -40 C -40 -80 -80 -100 -80 -100 C -80 -100 -30 -80 -5 -45 Z" fill="#74c7ec" opacity="0.8"/>
    </g>

    <text x="600" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="900" fill="url(#text-grad)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">
        CYBER CATPPUCCIN
    </text>
    <text x="600" y="340" font-family="monospace" font-size="20" font-weight="bold" fill="#a6adc8" text-anchor="middle" letter-spacing="10">
        FOR BLENDER
    </text>

    <line x1="220" y1="280" x2="320" y2="280" stroke="#74c7ec" stroke-width="3" filter="url(#glow)"/>
    <line x1="320" y1="280" x2="350" y2="310" stroke="#74c7ec" stroke-width="3" filter="url(#glow)"/>
    <line x1="980" y1="280" x2="880" y2="280" stroke="#cba6f7" stroke-width="3" filter="url(#glow)"/>
    <line x1="880" y1="280" x2="850" y2="310" stroke="#cba6f7" stroke-width="3" filter="url(#glow)"/>
</svg>
